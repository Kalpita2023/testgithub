name: Auto Create Pull Request

on:
  push:
    branches:
      - 'feature/*'      # Triggers on any branch starting with feature/

permissions:
  contents: write
  pull-requests: write   # Mandatory for the bot to create a PR

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automated PR from ${{ github.ref_name }}"
          title: "PR: Merge ${{ github.ref_name }} into Main"
          body: |
            This Pull Request was automatically created by GitHub Actions.
            - *Branch:* ${{ github.ref_name }}
            - *Triggered by:* ${{ github.actor }}
          base: main      # The target branch you want to merge into
          branch: pr-automation/${{ github.ref_name }} # Creates a unique tracking branch
